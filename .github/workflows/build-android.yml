name: Build shanPro Android APK (.NET 8 MAUI C#)
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Android MAUI workload
        run: dotnet workload install maui-android

      - name: Restore NuGet packages
        run: dotnet restore ./shanPro.csproj

      - name: Release build Android APK
        run: dotnet publish ./shanPro.csproj -c Release -f net8.0-android34.0

      - name: Upload compiled APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: shanPro-release-apk
          path: bin/Release/net8.0-android34.0/publish/*.apk
